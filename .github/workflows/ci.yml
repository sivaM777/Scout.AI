name: CI

on:
  push:
    branches:
      - main
      - "codex/**"
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install Node dependencies
        run: npm ci

      - name: Typecheck workspaces
        run: npm run typecheck

      - name: Build backend packages
        run: npm run build --workspace @scout/shared && npm run build --workspace @scout/api-gateway

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: services/ai-engine/requirements.txt

      - name: Install AI engine dependencies
        run: pip install -r services/ai-engine/requirements.txt

      - name: Validate AI engine imports
        run: python -m compileall services/ai-engine/app
