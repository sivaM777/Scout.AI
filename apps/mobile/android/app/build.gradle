apply plugin: "com.android.application"
apply plugin: "org.jetbrains.kotlin.android"
apply plugin: "com.facebook.react"

def scoutApiBaseUrl = (findProperty("SCOUT_API_BASE_URL") ?: "http://10.0.2.2:4000").toString()
def escapedScoutApiBaseUrl = scoutApiBaseUrl.replace("\\", "\\\\").replace("\"", "\\\"")
def hermescBinaryName = System.properties["os.name"].toLowerCase().contains("windows") ? "hermesc.exe" : "hermesc"
def hermesCommandPath = file("../../../../node_modules/react-native/sdks/hermesc/%OS-BIN%/${hermescBinaryName}").path
def keystoreProperties = new Properties()
def keystorePropertiesFile = rootProject.file("keystore.properties")

if (keystorePropertiesFile.exists()) {
    keystorePropertiesFile.withInputStream { stream ->
        keystoreProperties.load(stream)
    }
}

def releaseStorePath = (keystoreProperties.getProperty("storeFile") ?: System.getenv("SCOUT_UPLOAD_STORE_FILE"))?.toString()
def releaseStorePassword = (keystoreProperties.getProperty("storePassword") ?: System.getenv("SCOUT_UPLOAD_STORE_PASSWORD"))?.toString()
def releaseKeyAlias = (keystoreProperties.getProperty("keyAlias") ?: System.getenv("SCOUT_UPLOAD_KEY_ALIAS"))?.toString()
def releaseKeyPassword = (keystoreProperties.getProperty("keyPassword") ?: System.getenv("SCOUT_UPLOAD_KEY_PASSWORD"))?.toString()
def hasReleaseSigning = [releaseStorePath, releaseStorePassword, releaseKeyAlias, releaseKeyPassword].every { value ->
    value != null && !value.trim().isEmpty()
}

react {
    root = file("../..")
    reactNativeDir = file("../../../../node_modules/react-native")
    codegenDir = file("../../../../node_modules/@react-native/codegen")
    cliFile = file("../../../../node_modules/react-native/cli.js")
    hermesCommand = hermesCommandPath
    autolinkLibrariesWithApp()
}

android {
    namespace "com.scoutai"
    compileSdk rootProject.ext.compileSdkVersion

    signingConfigs {
        if (hasReleaseSigning) {
            release {
                storeFile file(releaseStorePath)
                storePassword releaseStorePassword
                keyAlias releaseKeyAlias
                keyPassword releaseKeyPassword
            }
        }
    }

    defaultConfig {
        applicationId "com.scoutai"
        minSdkVersion rootProject.ext.minSdkVersion
        targetSdkVersion rootProject.ext.targetSdkVersion
        versionCode 1
        versionName "1.0.0"
        buildConfigField "String", "SCOUT_API_BASE_URL", "\"${escapedScoutApiBaseUrl}\""
    }

    buildTypes {
        debug {}
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile("proguard-android.txt"), "proguard-rules.pro"
            if (hasReleaseSigning) {
                signingConfig signingConfigs.release
            }
        }
    }
}

dependencies {
    implementation("com.facebook.react:react-android")
    implementation("org.jetbrains.kotlin:kotlin-stdlib:${rootProject.ext.kotlinVersion}")

    if (hermesEnabled.toBoolean()) {
        implementation("com.facebook.react:hermes-android")
    } else {
        implementation("org.webkit:android-jsc:+")
    }
}
